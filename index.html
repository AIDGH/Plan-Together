<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Planner</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- صفحه لاگین که کل صفحه رو می‌پوشونه -->
    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <h2>Login to Planner</h2>
            <input type="email" id="login-email" placeholder="Email" dir="ltr" autocapitalize="none" autocorrect="off">
            <div class="password-wrapper">
                <input type="password" id="login-pass" placeholder="Password" dir="ltr" autocapitalize="none" autocorrect="off">
                <button type="button" id="toggle-pass-btn" class="eye-btn" title="نمایش رمز">
                    <!-- آیکون چشم باز (پیش‌فرض) -->
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
            <p id="login-error" style="color: #ef4444; font-size: 0.9rem; margin-top: 10px; display: none;">Invalid email or password!</p>
        </div>
    </div>

    <!-- این دو تا آیدی مخفی میشن تا وقتی که لاگین کنید -->
    <nav class="navbar hidden-app" id="app-nav">
        <div class="nav-brand">Planner</div>
        <div class="nav-links">
            <button class="nav-btn active" data-target="daily-view">Daily</button>
            <button class="nav-btn" data-target="weekly-view">Weekly</button>
            <button class="nav-btn" data-target="monthly-view">Monthly</button>
            <!-- دکمه خروج اضافه شد -->
            <button id="logout-btn" class="nav-btn" style="color: #ef4444; font-weight: bold; margin-left: 15px;">Logout</button>
        </div>
    </nav>

    <main class="container hidden-app" id="app-main">
        <!-- Daily View -->
        <div id="daily-view" class="view-section active">
            <div class="split-layout">
                <div class="column arad-col">
                    <h2 id="daily-arad-title">Arad's Day</h2>
                    <div class="input-group">
                        <input type="text" id="arad-daily-input" placeholder="Add a new task..." dir="auto">
                        <button id="arad-daily-btn">Add</button>
                    </div>
                    <div id="arad-daily-tasks" class="task-list"></div>
                </div>
                
                <div class="column dorsa-col">
                    <h2 id="daily-dorsa-title">Dorsa's Day</h2>
                    <div class="input-group">
                        <input type="text" id="dorsa-daily-input" placeholder="Add a new task..." dir="auto">
                        <button id="dorsa-daily-btn">Add</button>
                    </div>
                    <div id="dorsa-daily-tasks" class="task-list"></div>
                </div>
            </div>
        </div>

        <!-- Weekly View -->
        <div id="weekly-view" class="view-section hidden">
            <div class="layout-with-sidebar">
                <div class="sidebar">
                    <h3>Floating Tasks</h3>
                    <p class="subtitle">Tasks for this week</p>
                    <div class="input-group" style="flex-direction: column; gap: 8px;">
                        <input type="text" id="weekly-float-input" placeholder="Add floating task..." dir="auto">
                        <div style="display: flex; gap: 8px;">
                            <button id="w-f-arad" class="btn-a" style="flex:1">Arad</button>
                            <button id="w-f-dorsa" class="btn-d" style="flex:1">Dorsa</button>
                        </div>
                    </div>
                    <div id="weekly-floating-tasks" class="task-list"></div>
                </div>
                <div class="main-grid weekly-grid" id="weekly-grid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </div>

        <!-- Monthly View -->
        <div id="monthly-view" class="view-section hidden">
            <div id="monthly-header" style="text-align: center; margin-bottom: 20px;">
                <h2 id="monthly-title-text" style="font-size: 1.6rem; margin: 0; color: #1e293b; font-family: 'Vazirmatn', sans-serif;"></h2>
                <div id="monthly-subtitle-text" style="font-size: 1.3rem; color: #64748b; margin-top: 5px; font-weight: bold; font-family: 'Vazirmatn', sans-serif;"></div>
            </div>

            <div class="monthly-filter">
                <button id="filter-arad" class="m-filter-btn active arad">Arad</button>
                <button id="filter-dorsa" class="m-filter-btn inactive">Dorsa</button>
            </div>

            <div class="layout-with-sidebar">
                <div class="sidebar">
                    <h3>Month Backlog</h3>
                    <p class="subtitle">Tasks & Floating tasks</p>
                    <div class="input-group" style="flex-direction: column; gap: 8px;">
                        <input type="text" id="monthly-backlog-input" placeholder="Add backlog..." dir="auto">
                        <div style="display: flex; gap: 8px;">
                            <button id="m-b-arad" class="btn-a" style="flex:1">Arad</button>
                            <button id="m-b-dorsa" class="btn-d" style="flex:1">Dorsa</button>
                        </div>
                    </div>
                    <div id="monthly-backlog-tasks" class="task-list"></div>
                </div>
                <div class="main-grid monthly-grid" id="calendar-grid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
